<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成式 AI 證照衝刺</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
  :root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#58a6ff;--accent2:#bc8cff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--text:#e6edf3;--muted:#8b949e;--r:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text)}
  .shell{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;padding:16px;gap:12px}
  header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
  .logo{font-size:22px}
  .title-block h1{font-size:16px;font-weight:700}
  .title-block p{font-size:12px;color:var(--muted);margin-top:2px}
  .exam-badge{margin-left:auto;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .tabs{display:flex;gap:6px}
  .tab{flex:1;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
  .tab:hover{color:var(--text);border-color:#444}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .panel{display:none;flex:1;flex-direction:column;gap:10px;overflow:hidden}
  .panel.active{display:flex}
  .chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
  .chat-msgs::-webkit-scrollbar{width:4px}
  .chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .msg{max-width:88%;padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.65}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:3px}
  .msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px}
  .msg.sys{align-self:center;background:transparent;border:1px dashed var(--border);color:var(--muted);font-size:12px;text-align:center;max-width:100%}
  .msg.ai h3{color:var(--accent);font-size:13px;margin:8px 0 4px}
  .msg.ai ul{padding-left:16px;margin:4px 0}
  .msg.ai li{margin:3px 0}
  .msg.ai strong{color:var(--accent2)}
  .tag-hot{color:var(--red);font-size:11px;font-weight:700}
  .tag-warn{color:var(--yellow);font-size:11px;font-weight:700}
  .msg.ai hr{border:none;border-top:1px solid var(--border);margin:8px 0}
  .chat-input-row{display:flex;gap:8px}
  .chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
  .chat-input:focus{border-color:var(--accent)}
  .send-btn{padding:0 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer}
  .quick-btns{display:flex;gap:6px;flex-wrap:wrap}
  .quick-btn{padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
  .quick-btn:hover{border-color:var(--accent);color:var(--accent)}
  .quiz-header{display:flex;align-items:center;gap:10px}
  .qprog{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .qprog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s}
  .qctr{font-size:12px;color:var(--muted);white-space:nowrap}
  .qscore{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--green);white-space:nowrap}
  .qcard{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
  .qcat{font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:1px;text-transform:uppercase}
  .qq{font-size:15px;font-weight:600;line-height:1.6}
  .qopts{display:flex;flex-direction:column;gap:8px}
  .qopt{padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;transition:all .15s}
  .qopt:hover:not(.disabled){border-color:var(--accent);background:rgba(88,166,255,.08)}
  .qopt.correct{border-color:var(--green);background:rgba(63,185,80,.12);color:var(--green);font-weight:600}
  .qopt.wrong{border-color:var(--red);background:rgba(248,81,73,.12);color:var(--red)}
  .qopt.disabled{cursor:default}
  .qexplain{padding:12px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:8px;font-size:13px;line-height:1.6;color:var(--muted);display:none}
  .qexplain.show{display:block}
  .qexplain strong{color:var(--accent)}
  .qnav{display:flex;gap:8px}
  .qnav button{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .qnav button:hover{border-color:var(--accent);color:var(--accent)}
  .qnav button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .cheatsheet{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
  .cs-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .cs-head{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .cs-head:hover{background:rgba(255,255,255,.03)}
  .cs-title{font-size:14px;font-weight:700;flex:1}
  .cs-body{display:none;padding:0 14px 14px}
  .cs-body.open{display:block}
  .cs-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
  .cs-item:last-child{border-bottom:none}
  .cs-key{color:var(--accent);font-weight:600;min-width:130px;flex-shrink:0}
  .cs-val{color:var(--muted)}
  .tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;margin-right:3px}
  .tag.hot{background:rgba(248,81,73,.2);color:var(--red)}
  .tag.imp{background:rgba(210,153,34,.2);color:var(--yellow)}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">🤖</div>
    <div class="title-block">
      <h1>生成式 AI 證照衝刺</h1>
      <p>資策會 iCAP 認證備考工具（離線版）</p>
    </div>
    <div class="exam-badge">6/27 考試</div>
  </header>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('chat')">💬 知識問答</div>
    <div class="tab" onclick="switchTab('quiz')">📝 模擬測驗</div>
    <div class="tab" onclick="switchTab('cheatsheet')">📋 考前速查</div>
  </div>

  <!-- Chat -->
  <div class="panel active" id="panel-chat">
    <div class="chat-msgs" id="chat-msgs">
      <div class="msg sys">離線知識庫 ✅ 無需網路，直接點選主題</div>
      <div class="msg ai">嗨 Hua！考前衝刺加油 🎯<br><br>點下方按鈕查詢各主題重點，或直接輸入關鍵字（如「RAG」「幻覺」「LoRA」）即可查詢。<br><br>把握這幾天，一定能過！💪</div>
    </div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="ask('transformer')">🤖 Transformer</button>
      <button class="quick-btn" onclick="ask('prompt')">✍️ Prompt 工程</button>
      <button class="quick-btn" onclick="ask('rag')">🔍 RAG</button>
      <button class="quick-btn" onclick="ask('finetune')">🎯 Fine-tuning</button>
      <button class="quick-btn" onclick="ask('ethics')">⚠️ AI 倫理</button>
      <button class="quick-btn" onclick="ask('embedding')">📐 Embedding</button>
      <button class="quick-btn" onclick="ask('agent')">🦾 AI Agent</button>
      <button class="quick-btn" onclick="ask('security')">🔒 AI 安全</button>
      <button class="quick-btn" onclick="ask('multimodal')">🖼️ 多模態</button>
      <button class="quick-btn" onclick="ask('hotlist')">🔥 10大高頻考點</button>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="輸入關鍵字（RAG、幻覺、LoRA…）" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="send-btn" onclick="sendChat()">查詢</button>
    </div>
  </div>

  <!-- Quiz -->
  <div class="panel" id="panel-quiz">
    <div class="quiz-header">
      <div class="qprog"><div class="qprog-fill" id="qfill" style="width:0%"></div></div>
      <span class="qctr" id="qctr">1 / 20</span>
      <span class="qscore" id="qscore">✓ 0</span>
    </div>
    <div class="qcard" id="qcard">
      <div style="text-align:center;padding:20px;color:var(--muted)">
        <div style="font-size:44px;margin-bottom:12px">📝</div>
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px">模擬測驗</div>
        <div style="font-size:13px;margin-bottom:20px">20 題隨機出題，涵蓋所有考試類別</div>
        <button onclick="startQuiz()" style="padding:10px 30px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">開始測驗</button>
      </div>
    </div>
  </div>

  <!-- Cheatsheet -->
  <div class="panel" id="panel-cheatsheet">
    <div class="cheatsheet" id="cheatsheet"></div>
  </div>
</div>

<script>
function switchTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['chat','quiz','cheatsheet'][i]===n));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+n).classList.add('active');
}

const KB={
  transformer:{title:'🤖 Transformer 架構',html:`<h3>核心組件</h3><ul><li><strong>Self-Attention（自注意力）</strong>：讓模型衡量序列中每個詞與其他詞的相關程度 <span class="tag-hot">🔥高頻</span></li><li><strong>Multi-Head Attention</strong>：多組注意力並行，捕捉不同面向的關係</li><li><strong>位置編碼（Positional Encoding）</strong>：補充序列位置資訊（Attention 本身無順序概念）</li><li><strong>FFN（Feed Forward Network）</strong>：每個位置獨立通過的前饋層</li></ul><h3>架構分類 <span class="tag-hot">🔥必考</span></h3><ul><li><strong>Encoder-only</strong>（BERT）：雙向理解，適合分類、NER、問答</li><li><strong>Decoder-only</strong>（GPT 系列）：單向自迴歸生成，適合文字生成</li><li><strong>Encoder-Decoder</strong>（T5、BART）：適合翻譯、摘要等 seq2seq 任務</li></ul><h3>⚠️ 常考陷阱</h3><ul><li>GPT 是 <strong>Decoder-only</strong>，不是 Encoder-Decoder</li><li>BERT 雙向、GPT 單向（從左到右）</li><li>Token ≠ 完整詞；英文 1詞 ≈ 1-2 tokens</li></ul>`},
  prompt:{title:'✍️ Prompt Engineering',html:`<h3>提示類型 <span class="tag-hot">🔥必考</span></h3><ul><li><strong>Zero-shot</strong>：不給範例直接問，靠模型本身能力</li><li><strong>Few-shot</strong>：給 2–5 個範例讓模型類比學習</li><li><strong>Chain-of-Thought（CoT）</strong>：要求模型「一步步思考」，提升推理準確度</li><li><strong>System Prompt</strong>：設定模型角色、行為規則、輸出格式</li></ul><h3>重要參數</h3><ul><li><strong>Temperature</strong>：高→多樣創意；低→確定保守；0≈greedy <span class="tag-hot">🔥</span></li><li><strong>Top-p / Top-k</strong>：控制詞彙採樣範圍</li><li><strong>Max tokens</strong>：控制輸出長度上限</li></ul><h3>⚠️ 常考陷阱</h3><ul><li>Few-shot <strong>prompting</strong> ≠ Few-shot <strong>fine-tuning</strong>（前者不改模型參數）</li><li>CoT 對簡單任務效果不明顯，適合複雜推理題</li></ul>`},
  rag:{title:'🔍 RAG（檢索增強生成）',html:`<h3>RAG 流程 <span class="tag-hot">🔥必考</span></h3><ul><li>① 文件切塊 → ② Embedding 向量化 → ③ 存入向量資料庫</li><li>④ 使用者提問 → ⑤ 查詢向量化 → ⑥ 相似度檢索 → ⑦ 組合 Context → ⑧ LLM 生成</li></ul><h3>RAG vs Fine-tuning <span class="tag-hot">🔥必考</span></h3><ul><li><strong>RAG</strong>：知識外部化；可即時更新；不改模型參數；適合知識更新頻繁場景</li><li><strong>Fine-tuning</strong>：修改模型參數；適合改變模型行為/語氣/風格</li><li>⚠️ RAG 解決「知識截止」問題；Fine-tuning 解決「行為調整」問題</li></ul><h3>向量資料庫</h3><ul><li>常見：Pinecone、Chroma、Weaviate、Qdrant、Milvus</li><li>相似度：<strong>餘弦相似度（Cosine Similarity）</strong>最常用 <span class="tag-hot">🔥</span></li></ul>`},
  finetune:{title:'🎯 Fine-tuning 微調',html:`<h3>主要方法 <span class="tag-hot">🔥必考</span></h3><ul><li><strong>Full Fine-tuning</strong>：更新所有參數，效果最好，成本最高</li><li><strong>LoRA</strong>（Low-Rank Adaptation）：低秩矩陣，只訓練少量附加參數，高效輕量 <span class="tag-hot">🔥</span></li><li><strong>PEFT</strong>：Parameter-Efficient Fine-Tuning，LoRA/Adapter 等的統稱</li><li><strong>Instruction Tuning</strong>：用指令-回應對訓練，提升遵循指令能力</li></ul><h3>RLHF <span class="tag-hot">🔥必考</span></h3><ul><li>人類偏好反饋強化學習，ChatGPT 的關鍵訓練方法</li><li>步驟：SFT（監督微調）→ Reward Model → PPO 強化學習</li><li>目標：HHH — <strong>H</strong>elpful + <strong>H</strong>onest + <strong>H</strong>armless</li></ul><h3>⚠️ 常考陷阱</h3><ul><li>LoRA 不修改原始模型權重，只新增低秩矩陣</li><li>Fine-tuning 後知識仍有截止日，不等同於即時更新</li></ul>`},
  embedding:{title:'📐 Embedding 與向量',html:`<h3>基本概念</h3><ul><li><strong>Embedding</strong>：將文字/圖像轉換為高維數值向量的表示</li><li>語義相近的內容，向量距離也相近（語義相似 ≈ 向量相似）</li><li>應用：語義搜尋、RAG 檢索、推薦系統、分類</li></ul><h3>相似度計算 <span class="tag-hot">🔥必考</span></h3><ul><li><strong>餘弦相似度（Cosine Similarity）</strong>：計算夾角，值域 -1~1，越接近 1 越相似</li><li><strong>歐式距離（Euclidean Distance）</strong>：直線距離，值越小越相似</li><li>⚠️ 高維空間通常用餘弦相似度，方向比距離更能反映語義</li></ul><h3>常見向量資料庫</h3><ul><li>Pinecone（雲端）、Chroma（本地）、Weaviate、Milvus</li></ul>`},
  ethics:{title:'⚠️ AI 倫理與風險',html:`<h3>核心風險 <span class="tag-hot">🔥必考</span></h3><ul><li><strong>幻覺（Hallucination）</strong>：模型自信地輸出錯誤或虛假資訊 <span class="tag-hot">🔥</span></li><li><strong>AI 偏見（Bias）</strong>：訓練資料的偏見被模型學習並放大 <span class="tag-hot">🔥</span></li><li><strong>隱私問題</strong>：訓練資料可能含敏感個資；模型可能洩漏訓練資料</li><li><strong>版權問題</strong>：生成內容可能侵犯著作權</li></ul><h3>可信賴 AI 原則</h3><ul><li><strong>可解釋性（XAI）</strong>：讓 AI 決策過程透明可理解 <span class="tag-hot">🔥</span></li><li><strong>公平性（Fairness）</strong>：對不同群體一視同仁</li><li><strong>問責性（Accountability）</strong>：AI 決策錯誤須有追責機制</li><li><strong>HHH 原則</strong>：Helpful + Honest + Harmless</li></ul><h3>法規</h3><ul><li><strong>歐盟 AI 法（EU AI Act）</strong>：依風險分級管理，高風險 AI 須透明可解釋</li></ul>`},
  agent:{title:'🦾 AI Agent',html:`<h3>Agent 定義</h3><ul><li>能自主感知環境、規劃行動、呼叫工具、執行多步任務的 AI 系統</li><li>核心能力：<strong>計畫（Planning）+ 記憶（Memory）+ 工具使用（Tool Use）</strong></li></ul><h3>主要架構</h3><ul><li><strong>ReAct</strong>（Reasoning + Acting）：交替推理和行動的框架 <span class="tag-hot">🔥</span></li><li><strong>Tool Calling / Function Calling</strong>：讓 LLM 呼叫外部 API 或工具</li><li><strong>Multi-Agent</strong>：多個 Agent 協作完成複雜任務</li></ul><h3>常見工具</h3><ul><li>LangChain、LangGraph、AutoGen、CrewAI</li></ul>`},
  security:{title:'🔒 AI 安全',html:`<h3>主要攻擊手法 <span class="tag-hot">🔥必考</span></h3><ul><li><strong>Prompt Injection</strong>：惡意輸入覆蓋系統指令，讓模型執行未授權操作 <span class="tag-hot">🔥</span></li><li><strong>資料毒化（Data Poisoning）</strong>：訓練時植入惡意樣本，讓模型在特定觸發下產生錯誤輸出</li><li><strong>模型反轉攻擊（Model Inversion）</strong>：從模型輸出反推訓練資料</li><li><strong>對抗性攻擊（Adversarial Attack）</strong>：細微輸入擾動讓模型誤判</li></ul><h3>防護措施</h3><ul><li>輸入驗證與過濾；輸出內容審核（Content Moderation）</li><li>最小權限原則；Human-in-the-loop 監督</li><li>Red Team 測試；持續監控模型行為</li></ul>`},
  multimodal:{title:'🖼️ 多模態 AI',html:`<h3>定義 <span class="tag-hot">🔥</span></h3><ul><li>能同時處理<strong>文字、圖像、音訊、視訊</strong>等不同模態資料的 AI 模型</li><li>代表模型：GPT-4V、Gemini、Claude 3、LLaVA</li></ul><h3>應用場景</h3><ul><li>圖像問答（VQA）：上傳圖片提問</li><li>文件理解：OCR + 語意理解</li><li>圖像生成：DALL-E 3、Stable Diffusion、Midjourney</li><li>語音辨識（ASR）：Whisper</li></ul><h3>關鍵技術</h3><ul><li><strong>CLIP</strong>：對齊圖文向量空間（OpenAI）</li><li><strong>Vision Transformer (ViT)</strong>：將圖像切塊後用 Transformer 處理</li></ul>`},

};

const KEYWORD_MAP={

  prompt:['prompt','提示','few-shot','zero-shot','cot','chain','temperature','top-p','system'],
  rag:['rag','檢索','retrieval','向量資料庫','chroma','pinecone'],
  finetune:['fine','微調','lora','rlhf','peft','instruction','sft','hhh'],

function findTopic(t){
  const l=t.toLowerCase();
  for(const[k,kws]of Object.entries(KEYWORD_MAP)){if(kws.some(w=>l.includes(w)))return k;}
  return null;
}
function ask(topic){
  addMsg('user',KB[topic].title.replace(/^.\s/,''));
  setTimeout(()=>{
    const d=addMsg('ai','');
    d.innerHTML='<strong>'+KB[topic].title+'</strong>'+KB[topic].html;
    scrollMsgs();
  },150);
}
function sendChat(){
  const inp=document.getElementById('chat-input');
  const t=inp.value.trim();if(!t)return;
  inp.value='';addMsg('user',t);
  setTimeout(()=>{
    const topic=findTopic(t);
    if(topic){const d=addMsg('ai','');d.innerHTML='<strong>'+KB[topic].title+'</strong>'+KB[topic].html;}
    else addMsg('ai','🤔 找不到對應主題。試試：<br>RAG、Transformer、Prompt、Fine-tuning、幻覺、RLHF、LoRA、Agent、多模態、AI安全、10大考點');
    scrollMsgs();
  },150);
}
function addMsg(r,h){
  const d=document.createElement('div');
  d.className='msg '+r;d.innerHTML=h;
  document.getElementById('chat-msgs').appendChild(d);
  return d;
}
function scrollMsgs(){const m=document.getElementById('chat-msgs');m.scrollTop=m.scrollHeight;}

let qs={questions:[],current:0,correct:0,answered:false};
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function startQuiz(){qs.questions=shuffle(QB).slice(0,20);qs.current=0;qs.correct=0;renderQ();}
function renderQ(){
  const q=qs.questions[qs.current],total=qs.questions.length,idx=qs.current;
  qs.answered=false;
  document.getElementById('qfill').style.width=(idx/total*100)+'%';
  document.getElementById('qctr').textContent=`${idx+1} / ${total}`;
  document.getElementById('qscore').textContent=`✓ ${qs.correct}`;
  document.getElementById('qcard').innerHTML=`
    <div class="qcat">${q.cat}</div>
    <div class="qq">Q${idx+1}. ${q.q}</div>
    <div class="qopts">${q.opts.map((o,i)=>`<div class="qopt" onclick="ansQ(${i})">${'ABCD'[i]}. ${o}</div>`).join('')}</div>
    <div class="qexplain" id="exp"><strong>📖 解析：</strong>${q.exp}</div>
    <div class="qnav">
      <button onclick="nextQ()" id="skip-btn">跳過</button>
      <button class="primary" onclick="nextQ()" id="next-btn" style="display:none">下一題 →</button>
    </div>`;
}
function ansQ(i){
  if(qs.answered)return;qs.answered=true;
  const q=qs.questions[qs.current];
  document.querySelectorAll('.qopt').forEach(o=>o.classList.add('disabled'));
  document.querySelectorAll('.qopt')[i].classList.add(i===q.ans?'correct':'wrong');
  if(i!==q.ans)document.querySelectorAll('.qopt')[q.ans].classList.add('correct');
  if(i===q.ans)qs.correct++;
  document.getElementById('qscore').textContent=`✓ ${qs.correct}`;
  document.getElementById('exp').classList.add('show');
  document.getElementById('skip-btn').style.display='none';
  document.getElementById('next-btn').style.display='';
}
function nextQ(){
  qs.current++;
  if(qs.current<qs.questions.length)renderQ();
  else{
    const pct=Math.round(qs.correct/qs.questions.length*100);
    const e=pct>=80?'🎉':pct>=60?'💪':'📚';
    document.getElementById('qfill').style.width='100%';
    document.getElementById('qcard').innerHTML=`<div style="text-align:center;padding:20px"><div style="font-size:50px;margin-bottom:12px">${e}</div><div style="font-size:28px;font-weight:900;color:${pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)'}">${pct}%</div><div style="font-size:15px;margin:8px 0;color:var(--muted)">${qs.correct} / ${qs.questions.length} 答對</div><div style="font-size:13px;color:var(--muted);margin-bottom:20px">${pct>=80?'很棒！你準備好了！':pct>=60?'不錯！加強弱點！':'繼續練習！加油！'}</div><button onclick="startQuiz()" style="padding:10px 30px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">再測一次</button></div>`;
  }
}

function buildCS(){
  const c=document.getElementById('cheatsheet');
  CS.forEach((sec,si)=>{
    const d=document.createElement('div');d.className='cs-sec';
    d.innerHTML=`<div class="cs-head" onclick="toggleCS(${si})"><span>${sec.icon}</span><span class="cs-title">${sec.title}</span><span id="cst-${si}">▼</span></div><div class="cs-body${si===0?' open':''}" id="csb-${si}">${sec.items.map(it=>`<div class="cs-item"><span class="cs-key">${it.hot?'<span class="tag hot">高頻</span>':it.imp?'<span class="tag imp">重要</span>':''}${it.key}</span><span class="cs-val">${it.val}</span></div>`).join('')}</div>`;
    c.appendChild(d);

}
function toggleCS(i){const b=document.getElementById('csb-'+i),t=document.getElementById('cst-'+i);t.textContent=b.classList.toggle('open')?'▲':'▼';}
buildCS();
